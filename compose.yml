services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-gerenciamentoit}
      MYSQL_ROOT_HOST: "%"
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - gerenciamento_it_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-gerenciamentoit}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./API
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: gerenciamento_it
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-gerenciamentoit}
      DB_SSL_MODE: DISABLED
      BOOTSTRAP_ADMIN_MATRICULA: ${BOOTSTRAP_ADMIN_MATRICULA:-ADMIN-LOCAL}
      BOOTSTRAP_ADMIN_NOME: ${BOOTSTRAP_ADMIN_NOME:-Administrador Inicial}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
    ports:
      - "8080:8080"

volumes:
  gerenciamento_it_mysql:
